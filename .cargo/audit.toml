# Vulnerabilities and new informational advisories must fail the audit. These two unmaintained
# crates are accepted temporarily because Leptos 0.8 brings them in transitively and provides no
# compatible maintained replacement.
[advisories]
ignore = ["RUSTSEC-2024-0436", "RUSTSEC-2026-0173"]

[output]
deny = ["warnings"]
format = "terminal"
quiet = false
show_tree = true
